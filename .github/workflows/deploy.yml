name: Deploy to Fly.io

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    steps:
      # ── 1. Code checkout ──────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Install flyctl ─────────────────────────────────────────
      - name: Setup flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      # ── 3. Cookies গুলো Fly.io Secrets এ set করো ────────────────
      #    GitHub Secrets থেকে নেয়, কখনো log এ দেখাবে না
      - name: Set cookies as Fly.io secrets
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          # YouTube cookies (যদি secret set থাকে)
          if [ -n "${{ secrets.YOUTUBE_COOKIES }}" ]; then
            echo "Setting YouTube cookies..."
            flyctl secrets set YOUTUBE_COOKIES="${{ secrets.YOUTUBE_COOKIES }}" --stage
          fi

          # TikTok cookies
          if [ -n "${{ secrets.TIKTOK_COOKIES }}" ]; then
            echo "Setting TikTok cookies..."
            flyctl secrets set TIKTOK_COOKIES="${{ secrets.TIKTOK_COOKIES }}" --stage
          fi

          # Instagram cookies
          if [ -n "${{ secrets.INSTAGRAM_COOKIES }}" ]; then
            echo "Setting Instagram cookies..."
            flyctl secrets set INSTAGRAM_COOKIES="${{ secrets.INSTAGRAM_COOKIES }}" --stage
          fi

          # Facebook cookies
          if [ -n "${{ secrets.FACEBOOK_COOKIES }}" ]; then
            echo "Setting Facebook cookies..."
            flyctl secrets set FACEBOOK_COOKIES="${{ secrets.FACEBOOK_COOKIES }}" --stage
          fi

      # ── 4. Deploy ─────────────────────────────────────────────────
      - name: Deploy to Fly.io
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: flyctl deploy --remote-only
